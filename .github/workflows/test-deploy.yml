name: Test Deploy
"on": [push, pull_request]
jobs:
  test-current:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy (current - no --project)
        env:
          ZUPLO_API_KEY: ${{ secrets.ZUPLO_API_KEY }}
        run: npx zuplo deploy

  test-pinned:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy (pinned 6.68.9 - no --project)
        env:
          ZUPLO_API_KEY: ${{ secrets.ZUPLO_API_KEY }}
        run: npx zuplo@6.67.32 deploy

  test-no-project-flag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy fails with clear error when --project is omitted
        env:
          ZUPLO_API_KEY: ${{ secrets.ZUPLO_API_KEY }}
        run: npx zuplo@6.68.26 deploy

  test-project-no-account:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy (--project but no --account)
        env:
          ZUPLO_API_KEY: ${{ secrets.ZUPLO_API_KEY }}
        run: npx zuplo@6.68.26 deploy --project ci-test

  test-link-then-deploy-pinned:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Link then deploy pinned 6.67.32 (no --project on deploy)
        env:
          ZUPLO_API_KEY: ${{ secrets.ZUPLO_API_KEY }}
        run: |
          npx zuplo@6.67.32 link --account olive_excellent_jellyfish --project ci-test
          npx zuplo@6.67.32 deploy

  test-env-var-project-and-account:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy via ZUPLO_PROJECT + ZUPLO_ACCOUNT env vars
        env:
          ZUPLO_API_KEY: ${{ secrets.ZUPLO_API_KEY }}
          ZUPLO_PROJECT: ci-test
          ZUPLO_ACCOUNT: olive_excellent_jellyfish
        run: npx zuplo@6.68.26 deploy

  test-env-var-project-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy via ZUPLO_PROJECT only (no account)
        env:
          ZUPLO_API_KEY: ${{ secrets.ZUPLO_API_KEY }}
          ZUPLO_PROJECT: ci-test
        run: npx zuplo@6.68.26 deploy

  test-link-then-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Link then deploy (no --project on deploy)
        env:
          ZUPLO_API_KEY: ${{ secrets.ZUPLO_API_KEY }}
        run: |
          npx zuplo@6.68.26 link --account olive_excellent_jellyfish --project ci-test --environment production
          npx zuplo@6.68.26 deploy

  test-simulated-link-then-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Simulate linked config (.env.zuplo)
        run: |
          cat > .env.zuplo << EOF
          ZUPLO_ACCOUNT_NAME=olive_excellent_jellyfish
          ZUPLO_PROJECT_NAME=ci-test
          EOF
      - name: Deploy (no --project, linked config present)
        env:
          ZUPLO_API_KEY: ${{ secrets.ZUPLO_API_KEY }}
        run: npx zuplo@6.68.26 deploy
